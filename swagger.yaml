openapi: 3.0.0
info:
  title: Anti-Social Network API
  description: API REST para una red social anti-social
  version: 1.0.0
  contact:
    name: Gerardo Gonzalez Tulian
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Servidor local de desarrollo
  - url: http://localhost:5000
    description: Servidor alternativo

tags:
  - name: Users
    description: Operaciones de gestión de usuarios
  - name: Posts
    description: Operaciones de gestión de posts
  - name: Comments
    description: Operaciones de gestión de comentarios
  - name: Tags
    description: Operaciones de gestión de etiquetas

paths:
  /users:
    get:
      tags:
        - Users
      summary: Obtener todos los usuarios
      description: Retorna una lista de todos los usuarios del sistema
      responses:
        '200':
          description: Lista de usuarios obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Users
      summary: Crear un nuevo usuario
      description: Crea un nuevo usuario en el sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: El nickName o email ya existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Obtener un usuario por ID
      description: Retorna los detalles de un usuario, incluyendo sus posts, followers y following
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del usuario
      responses:
        '200':
          description: Usuario obtenido exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithRelations'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Users
      summary: Actualizar un usuario
      description: Actualiza los datos de un usuario existente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '200':
          description: Usuario actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Users
      summary: Eliminar un usuario
      description: Elimina un usuario del sistema
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del usuario
      responses:
        '204':
          description: Usuario eliminado exitosamente
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}/followers:
    get:
      tags:
        - Users
      summary: Obtener los seguidores de un usuario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del usuario
      responses:
        '200':
          description: Lista de seguidores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}/following:
    get:
      tags:
        - Users
      summary: Obtener los usuarios que sigue un usuario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del usuario
      responses:
        '200':
          description: Lista de usuarios seguidos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{followerId}/follow/{followedId}:
    post:
      tags:
        - Users
      summary: Seguir a un usuario
      description: Un usuario sigue a otro usuario
      parameters:
        - name: followerId
          in: path
          required: true
          schema:
            type: integer
          description: ID del usuario que sigue
        - name: followedId
          in: path
          required: true
          schema:
            type: integer
          description: ID del usuario a seguir
      responses:
        '201':
          description: Usuario seguido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: juan sigue a maria
        '400':
          description: Un usuario no puede seguirse a sí mismo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{followerId}/unfollow/{followedId}:
    delete:
      tags:
        - Users
      summary: Dejar de seguir a un usuario
      description: Un usuario deja de seguir a otro usuario
      parameters:
        - name: followerId
          in: path
          required: true
          schema:
            type: integer
          description: ID del usuario que deja de seguir
        - name: followedId
          in: path
          required: true
          schema:
            type: integer
          description: ID del usuario a dejar de seguir
      responses:
        '200':
          description: Dejó de seguir exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: juan dejó de seguir a maria
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts:
    get:
      tags:
        - Posts
      summary: Obtener todos los posts
      description: Retorna una lista de todos los posts del sistema
      responses:
        '200':
          description: Lista de posts obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Posts
      summary: Crear un nuevo post
      description: Crea un nuevo post en el sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreate'
      responses:
        '201':
          description: Post creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /posts/{id}:
    get:
      tags:
        - Posts
      summary: Obtener un post por ID
      description: Retorna los detalles de un post con sus imágenes, tags y comentarios (filtrados por antigüedad)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del post
      responses:
        '200':
          description: Post obtenido exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostWithRelations'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Posts
      summary: Actualizar un post
      description: Actualiza la descripción de un post existente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'
      responses:
        '200':
          description: Post actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Posts
      summary: Eliminar un post
      description: Elimina un post del sistema
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del post
      responses:
        '204':
          description: Post eliminado exitosamente
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts/{id}/images:
    post:
      tags:
        - Posts
      summary: Agregar imagen a un post
      description: Agrega una imagen (URL) a un post existente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostImageCreate'
      responses:
        '201':
          description: Imagen agregada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostImage'
        '400':
          description: URL inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts/{id}/images/{imageId}:
    delete:
      tags:
        - Posts
      summary: Eliminar imagen de un post
      description: Elimina una imagen de un post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del post
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
          description: ID de la imagen
      responses:
        '204':
          description: Imagen eliminada exitosamente
        '404':
          description: Post o imagen no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts/{id}/tags/{tagId}:
    post:
      tags:
        - Posts
      summary: Asociar una etiqueta a un post
      description: Agrega una etiqueta existente a un post (relación N:M)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del post
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
          description: ID de la etiqueta
      responses:
        '201':
          description: Etiqueta asociada exitosamente
        '404':
          description: Post o etiqueta no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Posts
      summary: Desasociar una etiqueta de un post
      description: Quita la asociación entre una etiqueta y un post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del post
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
          description: ID de la etiqueta
      responses:
        '200':
          description: Etiqueta desasociada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '404':
          description: Post o etiqueta no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /comments:
    get:
      tags:
        - Comments
      summary: Obtener todos los comentarios visibles
      description: Retorna una lista de todos los comentarios con isVisible=true
      responses:
        '200':
          description: Lista de comentarios obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Comments
      summary: Crear un nuevo comentario
      description: Crea un nuevo comentario en un post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreate'
      responses:
        '201':
          description: Comentario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /comments/{id}:
    get:
      tags:
        - Comments
      summary: Obtener un comentario por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del comentario
      responses:
        '200':
          description: Comentario obtenido exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '404':
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Comments
      summary: Actualizar un comentario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del comentario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentUpdate'
      responses:
        '200':
          description: Comentario actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Comments
      summary: Eliminar un comentario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del comentario
      responses:
        '204':
          description: Comentario eliminado exitosamente
        '404':
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tags:
    get:
      tags:
        - Tags
      summary: Obtener todas las etiquetas
      responses:
        '200':
          description: Lista de etiquetas obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'

    post:
      tags:
        - Tags
      summary: Crear una nueva etiqueta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreate'
      responses:
        '201':
          description: Etiqueta creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /tags/{id}:
    get:
      tags:
        - Tags
      summary: Obtener una etiqueta por ID
      description: Retorna la etiqueta con sus posts asociados
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID de la etiqueta
      responses:
        '200':
          description: Etiqueta obtenida exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagWithPosts'
        '404':
          description: Etiqueta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Tags
      summary: Actualizar una etiqueta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID de la etiqueta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreate'
      responses:
        '200':
          description: Etiqueta actualizada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Etiqueta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Tags
      summary: Eliminar una etiqueta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID de la etiqueta
      responses:
        '204':
          description: Etiqueta eliminada exitosamente
        '404':
          description: Etiqueta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    UserSummary:
      type: object
      properties:
        id:
          type: integer
        nickName:
          type: string
        name:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        nickName:
          type: string
          example: juan_perez
        email:
          type: string
          format: email
          example: juan@example.com
        name:
          type: string
          example: Juan Pérez
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserWithRelations:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            posts:
              type: array
              items:
                $ref: '#/components/schemas/Post'
            followers:
              type: array
              items:
                $ref: '#/components/schemas/UserSummary'
            following:
              type: array
              items:
                $ref: '#/components/schemas/UserSummary'

    UserCreate:
      type: object
      required:
        - nickName
        - email
        - name
      properties:
        nickName:
          type: string
          minLength: 3
          maxLength: 50
          example: juan_perez
        email:
          type: string
          format: email
          example: juan@example.com
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Juan Pérez

    Post:
      type: object
      properties:
        id:
          type: integer
        description:
          type: string
        userId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PostWithRelations:
      allOf:
        - $ref: '#/components/schemas/Post'
        - type: object
          properties:
            images:
              type: array
              items:
                $ref: '#/components/schemas/PostImage'
            tags:
              type: array
              items:
                $ref: '#/components/schemas/Tag'
            comments:
              type: array
              items:
                $ref: '#/components/schemas/Comment'

    PostCreate:
      type: object
      required:
        - description
        - userId
      properties:
        description:
          type: string
          minLength: 1
          example: Este es mi primer post
        userId:
          type: integer
          example: 1

    PostUpdate:
      type: object
      required:
        - description
      properties:
        description:
          type: string
          minLength: 1
          example: Post actualizado

    PostImage:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
          format: uri
        postId:
          type: integer

    PostImageCreate:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          example: https://example.com/image.jpg

    Comment:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        isVisible:
          type: boolean
        postId:
          type: integer
        userId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CommentCreate:
      type: object
      required:
        - text
        - postId
        - userId
      properties:
        text:
          type: string
          minLength: 1
          example: Excelente post
        postId:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1

    CommentUpdate:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          example: Comentario actualizado

    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    TagWithPosts:
      allOf:
        - $ref: '#/components/schemas/Tag'
        - type: object
          properties:
            posts:
              type: array
              items:
                $ref: '#/components/schemas/Post'

    TagCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: javascript

    Error:
      type: object
      properties:
        error:
          type: string
        campo:
          type: string
          description: Campo que causó el conflicto (para 409)

    ValidationError:
      type: object
      properties:
        errores:
          type: array
          items:
            type: object
            properties:
              atributo:
                type: string
              error:
                type: string
